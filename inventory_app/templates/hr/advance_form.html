{% extends 'base.html' %}
{% block title %}{{ page_title }} – Sendy HR{% endblock %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('hr.advance_list') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>รายการเบิก
  </a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:640px">
  <div class="card-header"><i class="bi bi-cash me-1"></i>{{ page_title }}</div>
  <div class="card-body">
    <form method="post" action="{{ action_url }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label small">พนักงาน <span class="text-danger">*</span></label>
          <select name="employee_id" class="form-select form-select-sm" required>
            <option value="">— เลือกพนักงาน —</option>
            {% for emp in employees %}
            <option value="{{ emp.id }}"
              {% if form.get('employee_id') == emp.id|string
                    or (adv and adv.employee_id == emp.id) %}selected{% endif %}>
              {{ emp.emp_code }} — {{ emp.full_name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small">วันที่เบิก <span class="text-danger">*</span></label>
          <input type="date" name="advance_date" class="form-control form-control-sm"
                 value="{{ form.get('advance_date', adv.advance_date if adv else today) }}"
                 required>
        </div>
        <div class="col-md-6">
          <label class="form-label small">จำนวนเงิน (฿) <span class="text-danger">*</span></label>
          <input type="number" name="amount" class="form-control form-control-sm"
                 value="{{ form.get('amount', adv.amount if adv else '') }}"
                 min="0.01" step="0.01" required>
        </div>
        <div class="col-12">
          <label class="form-label small">โอนจากบัญชี</label>
          <select name="from_account_id" class="form-select form-select-sm">
            <option value="">— ไม่ระบุ —</option>
            {% for acct in accounts %}
            <option value="{{ acct.id }}"
              {% if form.get('from_account_id') == acct.id|string
                    or (adv and adv.from_account_id == acct.id) %}selected{% endif %}>
              {{ acct.display_name or acct.code }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label small">หมายเหตุ</label>
          <input type="text" name="note" class="form-control form-control-sm"
                 value="{{ form.get('note', adv.note if adv else '') }}">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>บันทึก
          </button>
          <a href="{{ url_for('hr.advance_list') }}"
             class="btn btn-outline-secondary ms-2">ยกเลิก</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
