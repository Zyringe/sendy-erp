{% extends 'base.html' %}
{% block title %}เข้าสู่ระบบ – ERP{% endblock %}
{% block page_title %}เข้าสู่ระบบ{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card">
      <div class="card-header text-center">
        <i class="bi bi-person-lock me-2 text-accent"></i>เข้าสู่ระบบ
      </div>
      <div class="card-body">
        <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">ชื่อผู้ใช้</label>
            <input type="text" name="username" class="form-control form-control-lg" autofocus
                   autocomplete="username" inputmode="email" placeholder="username">
          </div>
          <div class="mb-3">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   autocomplete="current-password" placeholder="รหัสผ่าน">
          </div>
          <div class="form-check mb-3">
            <input type="checkbox" name="remember" id="remember" value="1"
                   class="form-check-input" checked>
            <label class="form-check-label" for="remember">จำฉันไว้ 30 วัน</label>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
