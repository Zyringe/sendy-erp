{# Mobile bottom navigation — visible only <lg (≤991.98px).
   Slots = MODULE HEADERS (Put's decision 2026-06-11): สินค้า · การค้า · บุคลากร ·
   การเงิน · เพิ่มเติม(drawer). The first four come from `mobile_nav_slots`
   (role-filtered in app.py::build_mobile_nav_slots — staff see only
   สินค้า/การค้า; a slot whose landing page would 403 is never rendered).
   ตรวจบิล is NOT a slot here — it lives in the drawer + dashboard banner.
   Slot 5 opens the offcanvas drawer in _mobile_drawer.html. #}
<nav class="bottom-nav d-lg-none" aria-label="เมนูหลักมือถือ">
  {% for slot in mobile_nav_slots %}
  <a href="{{ url_for(slot.endpoint) }}"
     class="bottom-nav-item {% if slot.active %}active{% endif %}">
    <i class="bi {{ slot.icon }}"></i>
    <span>{{ slot.label }}</span>
  </a>
  {% endfor %}
  <button type="button" class="bottom-nav-item"
          data-bs-toggle="offcanvas" data-bs-target="#mobileDrawer" aria-controls="mobileDrawer">
    <i class="bi bi-grid"></i>
    <span>เพิ่มเติม</span>
    {% if alert_count > 0 %}<span class="badge-count">{{ alert_count }}</span>{% endif %}
  </button>
</nav>
