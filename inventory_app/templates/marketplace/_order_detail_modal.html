{# Shared marketplace order drill-down modal. Include once per page; any element
   with class `js-order-detail` and `data-order-id` opens it. #}
<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h2 class="modal-title h5 mb-0">ออเดอร์ <code id="odSn"></code></h2>
          <div class="text-muted small" id="odSummary"></div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="ปิด"></button>
      </div>
      <div class="modal-body">
        <div id="odLoading" class="text-center text-muted py-4 d-none">
          <div class="spinner-border spinner-border-sm" role="status"></div> กำลังโหลด...
        </div>
        <div id="odError" class="alert alert-danger d-none"></div>
        <div id="odBody" class="d-none">
          <dl class="row small mb-2">
            <dt class="col-4 col-sm-3">ช่องทาง</dt><dd class="col-8 col-sm-9" id="odPlatform"></dd>
            <dt class="col-4 col-sm-3">ผู้รับ</dt><dd class="col-8 col-sm-9" id="odBuyer"></dd>
            <dt class="col-4 col-sm-3">ที่อยู่จัดส่ง</dt><dd class="col-8 col-sm-9" id="odShip"></dd>
            <dt class="col-4 col-sm-3">วันสั่ง / วันโอน</dt><dd class="col-8 col-sm-9" id="odDates"></dd>
            <dt class="col-4 col-sm-3">ยอดสินค้า / ค่าธรรมเนียม / ยอดโอน</dt><dd class="col-8 col-sm-9" id="odMoney"></dd>
            <dt class="col-4 col-sm-3">ใบกำกับ (IV)</dt><dd class="col-8 col-sm-9" id="odIv"></dd>
          </dl>
          <div id="odTimeline" class="mb-2"></div>
          <div id="odMargin" class="mb-2"></div>
          <div id="odAdjust" class="mb-2"></div>
          <table class="table table-sm table-bordered mb-0">
            <thead class="table-light"><tr>
              <th>สินค้า</th><th>SKU</th><th class="text-end">จำนวน</th>
              <th class="text-end">ราคา/หน่วย</th><th class="text-end">รวม</th>
            </tr></thead>
            <tbody id="odItems"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Wrapped in DOMContentLoaded so bootstrap.bundle (loaded after the content
// block in base.html) is available — otherwise new bootstrap.Modal() throws and
// no click handlers ever attach.
document.addEventListener('DOMContentLoaded', function () {
  const fmt = n => (n == null ? '–' : Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}));
  // Fee-breakdown body for the ค่าธรรมเนียม hover — same format as the settlement
  // page tooltip: item/credit lines first, then each deduction, footer = net.
  const escFee = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  function feeBreakdownHtml(lines, net) {
    const frow = (l, v, cls) => `<div class="d-flex justify-content-between gap-3"><span class="text-muted">${escFee(l)}</span><span class="${cls || ''}">${v}</span></div>`;
    let html = '', prevPos = null;
    lines.forEach(x => {
      const neg = x.amount < 0;
      if (prevPos === true && neg) html += '<div class="border-top my-1"></div>';
      html += frow(x.label, (neg ? '−' : '') + '฿' + fmt(Math.abs(x.amount)), neg ? 'text-danger' : '');
      prevPos = !neg;
    });
    html += '<div class="border-top my-1"></div>';
    html += `<div class="d-flex justify-content-between gap-3 fw-bold"><span>ยอดสุทธิ</span><span class="text-success">฿${fmt(net)}</span></div>`;
    return html;
  }
  const detModal = new bootstrap.Modal(document.getElementById('orderDetailModal'));
  const ivBadge = {confident: '<span class="badge bg-success">ยอดตรง ใบเดียว</span>',
                   probable:  '<span class="badge bg-warning text-dark">ยอดตรง (อาจสลับใบยอดเท่ากัน)</span>',
                   review:    '<span class="badge bg-info text-dark">⚠ ยอดในบิลไม่ตรงยอดโอน</span>',
                   manual:    '<span class="badge bg-primary">ยืนยันเอง</span>'};

  function openDetail(orderId) {
    const load = document.getElementById('odLoading'), body = document.getElementById('odBody'), err = document.getElementById('odError');
    load.classList.remove('d-none'); body.classList.add('d-none'); err.classList.add('d-none');
    detModal.show();
    fetch(`/marketplace/api/order/${orderId}`)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(d => {
        const o = d.order;
        const ff = d.fees;   // settlement breakdown (Income file) if uploaded, else null
        load.classList.add('d-none'); body.classList.remove('d-none');
        document.getElementById('odSn').textContent = o.order_sn;
        document.getElementById('odSummary').textContent = o.status || '';
        document.getElementById('odPlatform').textContent = o.platform;
        document.getElementById('odBuyer').textContent = o.buyer_name || '–';
        document.getElementById('odShip').textContent = [o.ship_address, o.buyer_phone].filter(Boolean).join(' · ') || '–';
        document.getElementById('odDates').textContent = (o.order_date ? o.order_date.slice(0,10) : '–') + ' / ' + (o.settled_at || 'ยังไม่โอน');
        // Fee: when the Income (settlement) file is uploaded, ff.fee_total is the
        // finalized fee (= item_value − net_payout, satang-true). Until then only the
        // Order-export estimate (o.marketplace_fee = commission+service+txn) exists —
        // it misses platform + ad/escrow fees, so flag it as not-yet-finalized.
        const feeFinal = ff ? ff.fee_total : o.marketplace_fee;
        const breakdown = d.fee_lines;   // detailed Thai-category lines (settled) or null
        const feeBadge = ff ? '' : ' <span class="badge bg-warning text-dark" title="ยังไม่ได้อัปโหลดไฟล์ Income (โอนเงินสำเร็จ) — ค่าธรรมเนียมจากไฟล์ Order เป็นค่าประมาณ ยังไม่รวมค่าธรรมเนียมแพลตฟอร์ม/โฆษณา">estimate</span>';
        // When the Income breakdown exists, the ค่าธรรมเนียม number gets a hover
        // popover with the per-line detail (same as the settlement-page tooltip).
        const feeCell = breakdown
          ? `<span id="odFeePop" class="text-danger" tabindex="0" style="cursor:help;border-bottom:1px dotted">฿${fmt(feeFinal)}</span>`
          : `<span class="text-danger">฿${fmt(feeFinal)}</span>${feeBadge}`;
        document.getElementById('odMoney').innerHTML = `฿${fmt(o.item_total)} / ${feeCell} / <span class="text-success fw-bold">฿${fmt(o.actual_payout)}</span>`;
        if (breakdown) new bootstrap.Popover(document.getElementById('odFeePop'), {
          trigger: 'hover focus', html: true, placement: 'top',
          title: 'ค่าธรรมเนียมแยกรายการ', content: feeBreakdownHtml(breakdown, ff.net_payout),
        });
        document.getElementById('odIv').innerHTML = o.matched_iv
          ? `<a href="/sales/doc/${o.matched_iv}" target="_blank" title="เปิดใบกำกับใน Express"><code>${o.matched_iv}</code></a> ${ivBadge[o.iv_confidence] || ''}`
          : '<span class="text-muted">ยังไม่ผูก</span>';
        document.getElementById('odItems').innerHTML = (d.items.length ? d.items.map(it => `
          <tr>
            <td>${it.resolved_name || it.item_name || ''}${it.variation_name ? ' <span class="text-muted">(' + it.variation_name + ')</span>' : ''}${it.internal_product_id ? '' : ' <span class="badge bg-warning text-dark">ยังไม่จับคู่</span>'}</td>
            <td class="small">${it.seller_sku || ''}</td>
            <td class="text-end">${it.qty}</td>
            <td class="text-end">${fmt(it.unit_price)}</td>
            <td class="text-end">${fmt(it.item_subtotal)}</td>
          </tr>`).join('') : '<tr><td colspan="5" class="text-muted text-center">ไม่มีรายการสินค้า</td></tr>');

        // ---- Timeline: order → Shopee released to wallet → bank deposit ----
        const step = (lbl, val, cls) =>
          `<div class="d-flex flex-column align-items-center text-center" style="flex:1">
             <span class="badge ${val ? cls : 'bg-light text-muted border'}">${val || '—'}</span>
             <span class="text-muted" style="font-size:.68rem">${lbl}</span>
           </div>`;
        const arrow = '<span class="text-muted px-1">→</span>';
        document.getElementById('odTimeline').innerHTML = `
          <div class="d-flex align-items-start justify-content-between border rounded p-2 bg-light small">
            ${step('วันสั่งซื้อ', o.order_date ? o.order_date.slice(0,10) : '', 'bg-secondary')}
            ${arrow}
            ${step('Shopee โอนเข้า wallet', o.settled_at, 'bg-info text-dark')}
            ${arrow}
            ${step('เข้าบัญชีธนาคาร', d.payout ? d.payout.deposit_date : '', 'bg-success')}
          </div>`;

        // ---- Adjustments / refunds booked against this order ----
        const adj = d.adjustments || [];
        document.getElementById('odAdjust').innerHTML = !adj.length ? '' : `
          <div class="border rounded p-2 small border-warning">
            <div class="fw-bold mb-1 text-warning"><i class="bi bi-arrow-counterclockwise"></i> การปรับปรุง / คืนเงิน</div>
            ${adj.map(a => `<div class="d-flex justify-content-between">
                <span class="text-muted">${a.txn_time}${a.description ? ' · ' + a.description : ''}</span>
                <span class="${a.amount<0?'text-danger':'text-success'}">${a.amount<0?'−':'+'}฿${fmt(Math.abs(a.amount))}</span>
              </div>`).join('')}
          </div>`;

        // ---- Gross margin: net payout − COGS (ratio-aware) ----
        const mg = d.margin;
        const odMargin = document.getElementById('odMargin');
        if (!mg) { odMargin.innerHTML = ''; }
        else if (mg.margin == null) {
          const why = mg.unresolved ? `${mg.unresolved} รายการจับคู่ ratio/สินค้าไม่ได้`
                    : (mg.cost_gap ? `${mg.cost_gap} รายการยังไม่มีต้นทุน` : 'ข้อมูลไม่ครบ');
          odMargin.innerHTML = `
            <div class="border rounded p-2 small bg-light">
              <span class="fw-bold">กำไรขั้นต้น</span> <span class="badge bg-secondary">ไม่ครบ</span>
              <span class="text-muted">— ${why} · ต้นทุนที่คิดได้ ฿${fmt(mg.cogs)}</span>
            </div>`;
        } else {
          const cls = mg.margin >= 0 ? 'text-success' : 'text-danger';
          odMargin.innerHTML = `
            <div class="border rounded p-2 small bg-light d-flex justify-content-between align-items-center">
              <span class="fw-bold"><i class="bi bi-graph-up-arrow"></i> กำไรขั้นต้น (สุทธิ − ต้นทุน)</span>
              <span><span class="text-muted">฿${fmt(mg.net)} − ฿${fmt(mg.cogs)} = </span>
                <span class="${cls} fw-bold">฿${fmt(mg.margin)} (${mg.margin_pct}%)</span></span>
            </div>`;
        }
      })
      .catch(e => { load.classList.add('d-none'); err.textContent = 'โหลดไม่สำเร็จ: ' + e.message; err.classList.remove('d-none'); });
  }

  // Event delegation so lazily-injected rows (deposits tab loads orders on
  // expand) also open the modal — not just rows present at DOMContentLoaded.
  document.addEventListener('click', function (e) {
    const t = e.target.closest('.js-order-detail');
    if (t) openDetail(t.dataset.orderId);
  });
});
</script>
