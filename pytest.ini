[pytest]
testpaths = tests
# inventory_app modules use bare imports (e.g. `from database import ...`)
# so we add it to sys.path. Repo root is added so `import inventory_app` also works.
pythonpath = inventory_app .
addopts = -ra
# tmp_db copies the ~95MB live inventory.db into tmp_path per test. Under the
# default policy=all those copies pile up (a full run leaves ~60GB, and killed
# runs never clean up) — see the 325GB pytest-of-putty leak on 2026-07-03.
# policy=failed deletes each passing test's copy at teardown, so normal runs
# (and killed runs, for the tests that already passed) leave ~0GB; only
# failed-test DBs are kept for debugging.
tmp_path_retention_policy = failed
tmp_path_retention_count = 1
filterwarnings =
    ignore::DeprecationWarning
